<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>smarttoolsclips — Links</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0B1120;
    --surface: #121A2E;
    --surface-hover: #182338;
    --line: #22304a;
    --cyan: #5EEAD4;
    --amber: #FBBF24;
    --text: #E2E8F0;
    --muted: #64748B;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 15% -10%, rgba(94,234,212,0.08), transparent 40%),
      radial-gradient(circle at 90% 10%, rgba(251,191,36,0.06), transparent 35%),
      var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    display:flex;
    justify-content:center;
    padding: 48px 16px 32px;
  }

  .page{
    width:100%;
    max-width: 460px;
  }

  /* ---- header / node network signature ---- */
  .header{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-bottom: 36px;
  }

  #netCanvas{
    position:absolute;
    top:-30px;
    width: 260px;
    height: 180px;
    opacity: 0.55;
    pointer-events:none;
  }

  .avatar{
    width: 88px;
    height: 88px;
    border-radius: 50%;
    object-fit: cover;
    z-index: 2;
    box-shadow: 0 0 0 4px var(--surface), 0 0 30px rgba(94,234,212,0.25);
  }

  .name{
    margin-top: 16px;
    font-family:'IBM Plex Mono', monospace;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
    z-index:2;
  }

  .tagline{
    margin-top: 6px;
    font-size: 13px;
    color: var(--muted);
    font-family:'IBM Plex Mono', monospace;
    z-index:2;
  }
  .tagline .cursor{
    display:inline-block;
    width: 7px;
    height: 13px;
    background: var(--cyan);
    margin-left: 2px;
    vertical-align: -2px;
    animation: blink 1.1s steps(1) infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }

  /* ---- section labels ---- */
  .section-label{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin: 28px 0 10px 4px;
    display:flex;
    align-items:center;
    gap:8px;
  }

  /* ---- horizontal social icons (header) ---- */
  .social-row{
    display:flex;
    justify-content:center;
    gap: 14px;
    margin-top: 18px;
    z-index:2;
  }
  .social-icon{
    width: 42px;
    height: 42px;
    border-radius: 50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--cyan);
    transition: transform .15s ease, border-color .15s ease, background .15s ease;
  }
  .social-icon:hover{
    transform: translateY(-2px);
    border-color: var(--cyan);
    background: var(--surface-hover);
  }
  .social-icon svg{
    width: 19px;
    height: 19px;
  }

  /* ---- link rows ---- */
  .links{
    display:flex;
    flex-direction:column;
    gap: 10px;
  }

  a.linkrow{
    position:relative;
    display:flex;
    align-items:center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    text-decoration:none;
    color: var(--text);
    transition: transform .15s ease, border-color .15s ease, background .15s ease;
    overflow:hidden;
  }
  a.linkrow::before{
    content:"";
    position:absolute;
    left:0; top:0; bottom:0;
    width: 3px;
    background: var(--cyan);
    transform: scaleY(0);
    transition: transform .15s ease;
  }
  a.linkrow:hover{
    transform: translateX(3px);
    border-color: var(--cyan);
    background: var(--surface-hover);
  }
  a.linkrow:hover::before{ transform: scaleY(1); }

  .icon{
    width: 20px;
    height: 20px;
    flex-shrink:0;
    color: var(--cyan);
  }
  a.linkrow.affiliate .icon{ color: var(--amber); }

  .linkrow.soon{
    opacity: 0.5;
    cursor: default;
  }
  .linkrow.soon:hover{
    transform: none;
    border-color: var(--line);
    background: var(--surface);
  }
  .linkrow.soon .row-sub{ font-style: italic; }

  .row-text{ flex: 1; min-width:0; }
  .row-title{
    font-size: 14.5px;
    font-weight: 500;
  }
  .row-sub{
    font-size: 12px;
    color: var(--muted);
    font-family:'IBM Plex Mono', monospace;
    margin-top: 2px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .arrow{
    font-family:'IBM Plex Mono', monospace;
    color: var(--muted);
    font-size: 14px;
  }

  footer{
    margin-top: 40px;
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  footer span{ color: var(--cyan); }
</style>
</head>

<script>
  // subtle animated node-network above the avatar — a nod to "link tree" as an actual network of nodes
  const canvas = document.getElementById('netCanvas');
  const ctx = canvas.getContext('2d');
  const DPR = window.devicePixelRatio || 1;
  const W = 260, H = 180;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  ctx.scale(DPR, DPR);

  const nodes = Array.from({length: 9}, () => ({
    x: Math.random() * W,
    y: Math.random() * H * 0.7,
    vx: (Math.random() - 0.5) * 0.15,
    vy: (Math.random() - 0.5) * 0.15,
  }));

  function step(){
    ctx.clearRect(0, 0, W, H);
    nodes.forEach(n => {
      n.x += n.vx; n.y += n.vy;
      if(n.x < 0 || n.x > W) n.vx *= -1;
      if(n.y < 0 || n.y > H*0.7) n.vy *= -1;
    });
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const a = nodes[i], b = nodes[j];
        const d = Math.hypot(a.x-b.x, a.y-b.y);
        if(d < 90){
          ctx.strokeStyle = `rgba(94,234,212,${(1 - d/90) * 0.4})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
    }
    nodes.forEach(n => {
      ctx.fillStyle = 'rgba(251,191,36,0.6)';
      ctx.beginPath();
      ctx.arc(n.x, n.y, 1.6, 0, Math.PI*2);
      ctx.fill();
    });
    requestAnimationFrame(step);
  }
  step();
</script>
